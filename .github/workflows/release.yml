name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  verify:
    if: github.event.deleted == false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Validate release tag
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          if [[ ! "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release tags must use the vX.Y.Z format; received: $VERSION" >&2
            exit 1
          fi

      - name: Test
        run: go test ./...

      - name: Test with the race detector
        run: go test -race ./...

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build ./cmd/opfm

  build:
    needs: verify
    if: github.event.deleted == false
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        goarch: [amd64, arm64]
    env:
      VERSION: ${{ github.ref_name }}
      GOOS: linux
      GOARCH: ${{ matrix.goarch }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build release archive
        shell: bash
        run: |
          target="opfm_${VERSION}_${GOOS}_${GOARCH}"
          mkdir -p "package/${target}" dist
          CGO_ENABLED=0 go build -trimpath \
            -ldflags "-s -w -X main.version=${VERSION}" \
            -o "package/${target}/opfm" ./cmd/opfm
          cp README.md LICENSE "package/${target}/"
          tar -C package -czf "dist/${target}.tar.gz" "${target}"

      - uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.goarch }}
          path: dist/*.tar.gz
          if-no-files-found: error

  publish:
    needs: build
    if: github.event.deleted == false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd dist
          sha256sum *.tar.gz > checksums.txt

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: opfm ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/checksums.txt
          fail_on_unmatched_files: true
